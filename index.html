<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Malak Shop Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Cairo',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
overflow:hidden;
position:relative;
color:white;
}

/* خلفية سوداء فاخرة */
body::before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(
90deg,
rgba(255,255,255,0.02) 0%,
rgba(255,255,255,0.01) 50%,
rgba(255,255,255,0.02) 100%
);
z-index:-3;
}

/* كتابة ضخمة بالخلف */
body::after{
content:"MALAK SHOP";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:9rem;
font-weight:700;
letter-spacing:10px;
color:transparent;
-webkit-text-stroke:1px rgba(255,255,255,0.08);
z-index:-2;
pointer-events:none;
}

/* صورة المنتج */
.hero-product{
position:absolute;
width:420px;
max-width:70%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:-1;

filter:
drop-shadow(0 0 30px rgba(255,255,255,0.15))
drop-shadow(0 30px 80px rgba(0,0,0,0.9));

animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{
transform:translate(-50%,-50%);
}
50%{
transform:translate(-50%,-54%);
}
100%{
transform:translate(-50%,-50%);
}
}

/* صندوق الشات */
.chat{
width:420px;
height:600px;

background:rgba(0,0,0,0.65);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.08);

border-radius:30px;

box-shadow:
0 20px 80px rgba(0,0,0,0.8),
0 0 30px rgba(255,255,255,0.04);

overflow:hidden;

display:flex;
flex-direction:column;
}

/* الهيدر */
.header{
padding:18px;
text-align:center;
font-size:1.1rem;
font-weight:700;
letter-spacing:2px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* الرسائل */
.messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.msg{
margin:12px 0;
padding:12px;
border-radius:15px;
line-height:1.7;
font-size:14px;
}

.bot{
background:rgba(255,255,255,0.05);
}

.user{
background:white;
color:black;
text-align:right;
margin-left:50px;
}

/* الإدخال */
.input{
display:flex;
border-top:1px solid rgba(255,255,255,0.08);
}

.input input{
flex:1;
padding:15px;
border:none;
background:transparent;
color:white;
outline:none;
font-family:'Cairo',sans-serif;
}

.input button{
width:70px;
border:none;
background:white;
color:black;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.input button:hover{
background:#e6e6e6;
}

@media(max-width:768px){

.chat{
width:95%;
height:90vh;
}

body::after{
font-size:4rem;
}

.hero-product{
width:260px;
}

}

</style>
</head>

<body>

<!-- ضع هنا رابط صورة السماعة -->
<img
src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e"
class="hero-product"
>

<div class="chat">

<div class="header">
MALAK SHOP ASSISTANT
</div>

<div class="messages" id="messages">
</div>

<div class="input">
<input
id="input"
placeholder="اكتبي رسالتك..."
onkeydown="if(event.key==='Enter')send()"
>
<button onclick="send()">➤</button>
</div>

</div>

<script>

let step="start";

const welcomeMessage=`
👋 مرحباً بك في MALAK SHOP

━━━━━━━━━━━━━━━━━━

📱 هواتف ذكية

💻 حواسيب محمولة

⌚ ساعات ذكية

🎧 سماعات احترافية

🖥️ إكسسوارات إلكترونية

━━━━━━━━━━━━━━━━━━

🚚 التوصيل إلى جميع الولايات

💳 الدفع عند الاستلام

📞 خدمة العملاء متوفرة يومياً

━━━━━━━━━━━━━━━━━━

هل ترغبين في تقديم طلب؟
`;

function addMessage(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.innerText=text;

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight;

}

window.onload=function(){

setTimeout(()=>{

addMessage(welcomeMessage,"bot");

step="ask";

},1000);

}

function send(){

const input=document.getElementById("input");

const text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

const t=text.toLowerCase();

setTimeout(()=>{

if(step==="ask"){

if(
t.includes("نعم") ||
t.includes("yes") ||
t.includes("طلب")
){

addMessage(
"ممتاز 🌟 أرسلي اسمك الكامل ورقم الهاتف والعنوان.",
"bot"
);

step="order";

}else{

addMessage(
"لا مشكلة 😊 يمكنك العودة في أي وقت.",
"bot"
);

step="end";

}

return;

}

if(step==="order"){

addMessage(
"هل أنت متأكدة من تأكيد الطلب؟",
"bot"
);

step="confirm";

return;

}

if(step==="confirm"){

if(
t.includes("نعم") ||
t.includes("yes")
){

addMessage(
"✅ تم تأكيد الطلب بنجاح. سنتواصل معك قريباً.",
"bot"
);

}else{

addMessage(
"❌ تم إلغاء الطلب.",
"bot"
);

}

step="end";

return;

}

addMessage(
"كيف يمكنني مساعدتك؟",
"bot"
);

},500);

}

</script>

</body>
</html>
