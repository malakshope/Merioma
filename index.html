<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malak Shop</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#050505;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat{
  width:420px;
  height:680px;
  background:#111;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  padding:15px;
  background:#222;
  text-align:center;
  font-weight:bold;
}

.messages{
  flex:1;
  padding:15px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:10px;
  border-radius:10px;
  max-width:80%;
}

.bot{background:#333; align-self:flex-start;}
.user{background:#fff;color:#000;align-self:flex-end;}

.input{
  display:flex;
  padding:10px;
  gap:10px;
  border-top:1px solid #333;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border-radius:10px;
  border:none;
  background:white;
}
</style>
</head>

<body>

<div class="chat">
  <div class="header">MALAK SHOP</div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="اكتب..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>

/* 🔥 رابط Google Apps Script */
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBE2Nsqdflp0FNz06_zoKiacWBUFaOoHDgtbGKtwdU-4KizB7t6nI9wRTV0-VHIEh5/exec";

/* 🧠 حالة الطلب */
let step = "name";

let order = {
  name:"",
  phone:"",
  product:"",
  quantity:1,
  total:0
};

/* 💬 إضافة رسالة */
function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
}

/* 🚀 إرسال إلى Google Sheets */
async function sendToSheet(){

  console.log("📤 Sending order...");

  const payload = {
    name: order.name,
    phone: order.phone,
    product: order.product,
    quantity: order.quantity,
    total: order.total,
    date: new Date().toLocaleString()
  };

  console.log("📦 Payload:", payload);

  try {

    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json();
    console.log("📥 Response:", data);

    if(data.status === "success"){
      addMsg("✅ تم إرسال الطلب بنجاح", "bot");
    } else {
      addMsg("❌ خطأ من السيرفر: " + data.message, "bot");
    }

  } catch(err){
    console.error("❌ ERROR:", err);
    addMsg("❌ فشل الاتصال بـ Google Sheets", "bot");
  }
}

/* 🧠 التحكم في المحادثة */
function handle(text){

  addMsg(text,"user");

  if(step==="name"){
    order.name=text;
    step="phone";
    addMsg("اكتب رقم الهاتف","bot");
  }

  else if(step==="phone"){
    order.phone=text;
    step="product";
    addMsg("اكتب اسم المنتج","bot");
  }

  else if(step==="product"){
    order.product=text;
    step="quantity";
    addMsg("اكتب الكمية","bot");
  }

  else if(step==="quantity"){
    order.quantity=parseInt(text)||1;
    order.total = order.quantity * 100;

    step="send";
    addMsg("جاري إرسال الطلب...","bot");

    sendToSheet();
  }
}

/* 📤 إرسال رسالة */
function sendMessage(){
  const input=document.getElementById("input");
  const text=input.value;
  input.value="";
  handle(text);
}

/* 👋 بداية */
addMsg("👋 أهلاً بك في Malak Shop","bot");
addMsg("اكتب اسمك للبدء","bot");

</script>

</body>
</html>
