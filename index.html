<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malak Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
/* (نفس CSS عندك بدون تغيير) */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;height:100vh;overflow:hidden;background:#050505;display:flex;justify-content:center;align-items:center;color:white;}
.background{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;z-index:-2;overflow:hidden;}
.background::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.015),rgba(255,255,255,.015) 2px,transparent 2px,transparent 60px);}
.big-text{position:absolute;font-size:220px;font-weight:800;line-height:.8;letter-spacing:10px;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.12);text-align:center;pointer-events:none;}
.hero{width:600px;max-width:80vw;filter:drop-shadow(0 0 20px rgba(255,255,255,.15)) drop-shadow(0 40px 100px rgba(0,0,0,.95));animation:float 6s ease-in-out infinite;}
@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-15px);}100%{transform:translateY(0);}}
.chat{width:420px;height:620px;background:rgba(0,0,0,.75);backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,.08);border-radius:30px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.8);display:flex;flex-direction:column;}
.header{padding:18px;text-align:center;font-size:20px;font-weight:700;letter-spacing:2px;border-bottom:1px solid rgba(255,255,255,.08);}
.messages{flex:1;padding:20px;overflow-y:auto;}
.msg{padding:12px 15px;margin-bottom:12px;border-radius:18px;line-height:1.8;font-size:14px;}
.bot{background:rgba(255,255,255,.05);}
.user{background:white;color:black;margin-right:50px;}
.input-box{display:flex;border-top:1px solid rgba(255,255,255,.08);}
.input-box input{flex:1;background:transparent;border:none;outline:none;padding:15px;color:white;font-family:'Cairo',sans-serif;}
.input-box button{width:70px;border:none;cursor:pointer;background:white;font-size:20px;font-weight:bold;}
.input-box button:hover{opacity:.9;}
@media(max-width:768px){.big-text{font-size:100px;}.hero{width:320px;}.chat{width:95%;height:90vh;}}
</style>
</head>

<body>

<div class="background">
<div class="big-text">WIRE<br>LESS</div>
<img src="headphone.png" class="hero">
</div>

<div class="chat">

<div class="header">MALAK SHOP</div>

<div class="messages" id="messages"></div>

<div class="input-box">
<input id="input" placeholder="اكتبي رسالتك..." onkeydown="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()">➤</button>
</div>

</div>

<!-- EmailJS -->
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>

<script>

emailjs.init("mtseCg7Q79u61GKUe"); // PUBLIC KEY

let step = "start";

let orderData = {
name: "",
phone: "",
message: ""
};

const welcome = `
👋 مرحباً بك في MALAK SHOP

━━━━━━━━━━━━━━

📱 هواتف ذكية
💻 حواسيب محمولة
🎧 سماعات احترافية
⌚ ساعات ذكية

━━━━━━━━━━━━━━

هل تريد تقديم طلب؟
`;

function addMessage(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
document.getElementById("messages").appendChild(div);
document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;
}

window.onload=()=>{
setTimeout(()=>{
addMessage(welcome,"bot");
step="ask";
},1000);
};

function sendEmail(){
emailjs.send(
"service_foo2xe",
"template_80967dt",
orderData
)
.then(()=>{
addMessage("📩 تم إرسال طلبك بنجاح وسنتواصل معك قريباً ❤️","bot");
})
.catch(err=>{
addMessage("❌ حدث خطأ في إرسال الطلب","bot");
console.log(err);
});
}

function sendMessage(){

const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

const t=text.toLowerCase();

setTimeout(()=>{

// 1 - البداية
if(step==="ask"){

if(t.includes("نعم") || t.includes("yes") || t.includes("طلب")){
addMessage("ممتاز 🌟 اكتب اسمك الكامل.", "bot");
step="name";
}else{
addMessage("شكراً لزيارتك ❤️", "bot");
step="end";
}
return;
}

// 2 - الاسم
if(step==="name"){
orderData.name = text;
addMessage("📱 اكتب رقم الهاتف.", "bot");
step="phone";
return;
}

// 3 - الهاتف
if(step==="phone"){
orderData.phone = text;
addMessage("🛒 اكتب تفاصيل الطلب.", "bot");
step="message";
return;
}

// 4 - الطلب
if(step==="message"){
orderData.message = text;

addMessage("هل أنت متأكد من تأكيد الطلب؟ (نعم / لا)", "bot");
step="confirm";
return;
}

// 5 - التأكيد
if(step==="confirm"){

if(t.includes("نعم") || t.includes("yes")){
addMessage("⏳ يتم إرسال طلبك الآن...", "bot");
sendEmail();
}else{
addMessage("❌ تم إلغاء الطلب.", "bot");
}
step="end";
return;
}

},500);
}

</script>

</body>
</html>
