<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malak Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
/* ===== نفس CSS متاعك بدون تغيير ===== */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cairo', sans-serif;
  height: 100vh;
  overflow: hidden;
  background: #050505;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.background {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: -2;
}

.big-text {
  position: absolute;
  font-size: 180px;
  font-weight: 800;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,255,255,.09);
}

.hero { width: 500px; max-width: 80vw; animation: float 6s ease-in-out infinite; }

@keyframes float {
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

.chat {
  width: 430px;
  height: 680px;
  background: rgba(5,5,5,.88);
  backdrop-filter: blur(28px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 28px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  padding: 18px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}

.avatar { width:38px;height:38px;border-radius:50%;background:#fff; }

.messages {
  flex: 1;
  padding: 18px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 85%;
  padding: 11px 15px;
  border-radius: 18px;
}

.bot { background: rgba(255,255,255,.07); align-self:flex-start; }
.user { background:#fff;color:#000; align-self:flex-end; }

.input-bar {
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid rgba(255,255,255,.07);
}

.input-bar input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.send-btn {
  width:40px;
  border-radius:50%;
  border:none;
  background:#fff;
}
</style>
</head>

<body>

<div class="background">
  <div class="big-text">MALAK SHOP</div>
</div>

<div class="chat">

  <div class="header">
    <div class="avatar"></div>
    <div>
      <div>Malak Shop</div>
      <small>متاح الآن</small>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <input id="input" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
/* ===== EMAILJS CONFIG ===== */
const EJS_PUBLIC_KEY = "mtseCg7Q79u61GKUe";
const EJS_SERVICE_ID = "service_foo2xe";
const EJS_TEMPLATE_ID = "template_80967dt";

emailjs.init({
  publicKey: EJS_PUBLIC_KEY
});

/* ===== STATE ===== */
let order = { name:"", phone:"", message:"" };

/* ===== UI ===== */
function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}

/* ===== SEND EMAIL ===== */
function sendEmail(){

  emailjs.send(
    EJS_SERVICE_ID,
    EJS_TEMPLATE_ID,
    {
      from_name: order.name,
      phone: order.phone,
      message: order.message
    }
  )
  .then(() => {
    addMsg("✅ تم إرسال طلبك بنجاح", "bot");
  })
  .catch((err) => {
    console.log(err);
    addMsg("❌ خطأ في الإرسال", "bot");
  });
}

/* ===== CHAT SIMPLE ===== */
function handle(text){
  addMsg(text,"user");

  if(!order.name){
    order.name = text;
    addMsg("ما رقم هاتفك؟","bot");
  }
  else if(!order.phone){
    order.phone = text;
    addMsg("اكتب طلبك الآن","bot");
  }
  else {
    order.message = text;
    addMsg("جاري إرسال الطلب...","bot");
    sendEmail();
  }
}

function sendMessage(){
  const input = document.getElementById("input");
  const text = input.value;
  input.value = "";
  handle(text);
}

/* ===== START ===== */
addMsg("👋 مرحباً بك في Malak Shop", "bot");
addMsg("اكتب اسمك للبدء", "bot");

</script>

</body>
</html>
